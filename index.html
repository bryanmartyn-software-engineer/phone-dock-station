<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Blackout Panel – Time, Weather & Alarms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== PURE BLACK THEME | NO GLASS, NO GRADIENTS ========== */
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
            color: #eeeeee;
            padding: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            cursor: grab;
            touch-action: pan-y pinch-zoom;
        }

        .dashboard:active {
            cursor: grabbing;
        }



        /* flat panels – solid black with subtle border */
        .panel {
            background: #0c0c0c;
            border-radius: 28px;
            padding: 32px 24px;
            border: 1px solid #222222;
            height: 480px;
            /* consistent height */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: none;
            box-shadow: none;
        }

        /* page visibility */
        .page {
            display: none;
        }

        .page.active-page {
            display: block;
            animation: fadeSlide 0.25s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(6px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* indicators — minimal dots */
        .indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 5px;
            padding: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 6px;
            background: #2a2a2a;
            transition: all 0.2s ease;
        }

        .dot.active {
            width: 24px;
            background: #e0e0e0;
            border-radius: 4px;
        }

        /* ========== TIME MODULE ========== */
        .time-block {
            text-align: center;
            justify-content: center;
            gap: 15px;
        }

        .clock-digits {
            font-size: 64px;
            font-weight: 600;
            font-family: 'SF Mono', 'Courier New', monospace;
            letter-spacing: 4px;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 2px;
            flex-wrap: wrap;
            color: #ffffff;
        }

        .clock-digits span {
            font-size: 68px;
        }

        .separator {
            font-size: 68px;
            animation: simpleBlink 1s infinite;
            color: #aaa;
            margin: 0 2px;
        }

        @keyframes simpleBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #ampm {
            font-size: 20px;
            font-weight: 500;
            background: #1a1a1a;
            padding: 6px 14px;
            border-radius: 40px;
            margin-left: 10px;
            letter-spacing: 0px;
            color: #ccc;
        }

        .date-text {
            font-size: 18px;
            font-weight: 400;
            color: #aaaaaa;
            margin-top: 14px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .greeting-simple {
            font-size: 18px;
            background: #111111;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 48px;
            margin-top: 18px;
            color: #dddddd;
            font-weight: 450;
        }

        .time-footnote {
            font-size: 9px;
            color: #3a3a3a;
            margin-top: 24px;
            text-align: center;
        }

        /* ========== WEATHER SECTION – ONLY CURRENT, NO FORECASTS ========== */
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .weather-header h2 {
            font-size: 22px;
            font-weight: 500;
            color: #eee;
            letter-spacing: -0.3px;
        }

        .loc-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #141414;
            padding: 6px 16px;
            border-radius: 100px;
        }

        .loc-name {
            font-size: 14px;
            font-weight: 450;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .icon-flat {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 44px;
            transition: 0.1s linear;
            color: #ccc;
            background: #111;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-flat:active {
            background: #2a2a2a;
            transform: scale(0.96);
        }

        .weather-main-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 28px;
            gap: 12px;
        }

        .temp-big {
            font-size: 58px;
            font-weight: 600;
            font-family: monospace;
            letter-spacing: -1px;
        }

        .weather-icon-large {
            font-size: 64px;
        }

        .desc-pill {
            background: #141414;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 16px;
            text-transform: capitalize;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #111111;
            flex: 1;
            padding: 12px 8px;
            border-radius: 24px;
            text-align: center;
            font-size: 12px;
            min-width: 80px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            margin-top: 6px;
            display: block;
            color: white;
        }

        .last-updated-txt {
            font-size: 9px;
            color: #333;
            text-align: center;
            margin-top: 28px;
        }

        /* ========== ALARM SECTION ========== */
        .alarm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .alarm-header h2 {
            font-size: 22px;
            font-weight: 500;
        }

        .alarm-list-container {
            flex-grow: 1;
            /* take available space */
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .alarm-row {
            background: #0f0f0f;
            padding: 16px 18px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid #1e1e1e;
        }

        .time-display-alarm {
            font-size: 22px;
            font-weight: 540;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .alarm-buttons {
            display: flex;
            gap: 12px;
        }

        .mini-btn {
            background: #181818;
            border: none;
            font-size: 20px;
            padding: 8px 14px;
            border-radius: 40px;
            color: #ddd;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .mini-btn:active {
            background: #2c2c2c;
        }

        .double-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .action-wide {
            flex: 1;
            background: #111;
            border: none;
            padding: 14px 0;
            border-radius: 32px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
        }

        .danger-action {
            background: #1f1212;
            color: #ff8a7a;
        }

        .alarm-note {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: #3a3a3a;
        }

        .empty-alarms {
            text-align: center;
            padding: 44px 20px;
            color: #5a5a5a;
            font-size: 14px;
        }

        /* MODALS — black minimal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: #0c0c0c;
            width: 85%;
            max-width: 320px;
            padding: 30px 22px;
            border-radius: 44px;
            border: 1px solid #222;
            text-align: center;
        }

        .modal-card h3 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .time-picker {
            background: #1a1a1a;
            border: none;
            font-size: 46px;
            font-family: monospace;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 38px;
            width: 100%;
            margin: 18px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 14px;
            margin-top: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            background: #181818;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-save {
            background: #2a2a2a;
            color: white;
        }

        .modal-cancel {
            background: #1a1a1a;
        }

        /* ringing alarm */
        .ringing .modal-card {
            animation: subtlePulse 0.9s infinite;
            background: #150000;
            border: 1px solid #aa2e2e;
        }

        @keyframes subtlePulse {
            0% {
                border-color: #8b2c2c;
            }

            100% {
                border-color: #c04444;
            }
        }

        .ringing-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }

        .ring-snooze {
            background: #1e2a36;
            padding: 12px 20px;
            border-radius: 40px;
        }

        .ring-stop {
            background: #3a1c1c;
            padding: 12px 24px;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            color: #eaeaea;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 13px;
            display: none;
            z-index: 1100;
            white-space: nowrap;
            border: 0.5px solid #2c2c2c;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        button,
        .icon-flat,
        .action-wide,
        .mini-btn {
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div class="dashboard">


        <!-- PAGE 1: TIME -->
        <div class="page time-page active-page">
            <div class="panel time-block">
                <div class="clock-digits">
                    <span id="hours">00</span>
                    <span class="separator">:</span>
                    <span id="minutes">00</span>
                    <span class="separator">:</span>
                    <span id="seconds">00</span>
                    <span id="ampm">AM</span>
                </div>
                <div class="date-text">
                    <span id="weekday">Monday</span>, <span id="month">Jan</span> <span id="day">1</span>, <span
                        id="year">2025</span>
                </div>
                <div class="greeting-simple" id="greeting">Good evening</div>
                <div class="time-footnote" id="time-last-updated"></div>
            </div>
        </div>

        <!-- PAGE 2: WEATHER (CURRENT ONLY - NO HOURLY, NO 5-DAY) -->
        <div class="page weather-page">
            <div class="panel">
                <div class="weather-header">
                    <h2>weather</h2>
                    <div class="loc-group">
                        <span class="loc-name" id="location">--</span>
                        <button class="icon-flat" id="getLocationBtn" aria-label="locate">📍</button>
                        <button class="icon-flat" id="refreshWeatherBtn" aria-label="refresh">↻</button>
                    </div>
                </div>
                <div class="weather-main-row">
                    <div class="temp-big"><span id="temperature">--</span>°C</div>
                    <div class="weather-icon-large"><span id="weather-icon">☀️</span></div>
                    <div class="desc-pill"><span id="description">clear</span></div>
                </div>
                <div class="stats-row">
                    <div class="stat-card">💧 humidity<br><span class="stat-value" id="humidity">--%</span></div>
                    <div class="stat-card">💨 wind<br><span class="stat-value" id="wind">-- km/h</span></div>
                    <div class="stat-card">🌡️ feels<br><span class="stat-value" id="feels-like">--°</span></div>
                </div>
                <div class="last-updated-txt" id="weather-last-updated"></div>
            </div>
        </div>

        <!-- PAGE 3: ALARMS -->
        <div class="page alarm-page">
            <div class="panel">
                <div class="alarm-header">
                    <h2>alarms</h2>
                    <button class="icon-flat" id="addAlarmBtn">+</button>
                </div>
                <div id="alarms-list" class="alarm-list-container">
                    <div class="empty-alarms">no alarms · tap +</div>
                </div>
                <div class="double-actions">
                    <button class="action-wide" id="snoozeBtn">snooze 5m</button>
                    <button class="action-wide danger-action" id="stopAlarmBtn">stop</button>
                </div>
                <div class="alarm-note">alarms work in background</div>
            </div>
        </div>

        <div class="indicators" id="indicatorsContainer"></div>
    </div>

    <!-- MODAL: Add alarm -->
    <div id="alarm-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>set alarm</h3>
            <input type="time" id="alarm-time" class="time-picker" step="60">
            <div class="modal-buttons">
                <button id="setAlarmBtn" class="modal-btn modal-save">set</button>
                <button id="cancelModalBtn" class="modal-btn modal-cancel">cancel</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Ringing -->
    <div id="alarm-ringing" class="modal-overlay ringing">
        <div class="modal-card">
            <h2>⏰ wake up</h2>
            <div class="clock-digits" style="font-size: 48px;" id="ringing-time">00:00</div>
            <div class="ringing-buttons">
                <button id="ringingSnoozeBtn" class="modal-btn ring-snooze">snooze 5m</button>
                <button id="ringingStopBtn" class="modal-btn ring-stop">stop</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-message"></div>

    <script>
        // ----- PURE BLACK THEME, WEATHER: CURRENT CONDITIONS ONLY (NO FORECASTS) -----
        let currentPage = 0;
        const pages = ['time', 'weather', 'alarm'];
        let touchStartX = 0;

        // Swipe + indicators
        function initSwipe() {
            const dash = document.querySelector('.dashboard');
            dash.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
            dash.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].screenX - touchStartX;
                if (Math.abs(diff) > 45) {
                    if (diff > 0 && currentPage > 0) { currentPage--; showPage(currentPage); }
                    else if (diff < 0 && currentPage < pages.length - 1) { currentPage++; showPage(currentPage); }
                }
            });
            buildIndicators();
            showPage(0);
        }

        function buildIndicators() {
            const container = document.getElementById('indicatorsContainer');
            container.innerHTML = '';
            pages.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (idx === 0 ? ' active' : '');
                dot.addEventListener('click', () => { currentPage = idx; showPage(idx); });
                container.appendChild(dot);
            });
        }

        function showPage(idx) {
            document.querySelectorAll('.page').forEach((p, i) => {
                p.classList.toggle('active-page', i === idx);
            });
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === idx);
            });
            currentPage = idx;
        }

        // ---- TIME ----
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            let hour12 = hours % 12;
            hour12 = hour12 ? hour12 : 12;
            document.getElementById('hours').textContent = hour12.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
            document.getElementById('ampm').textContent = ampm;
            const weekday = now.toLocaleDateString('en-US', { weekday: 'long' });
            const month = now.toLocaleDateString('en-US', { month: 'short' });
            const day = now.getDate();
            const year = now.getFullYear();
            document.getElementById('weekday').textContent = weekday;
            document.getElementById('month').textContent = month;
            document.getElementById('day').textContent = day;
            document.getElementById('year').textContent = year;
            const hourVal = now.getHours();
            let greet = '';
            if (hourVal < 12) greet = '🌅 good morning';
            else if (hourVal < 18) greet = '☀️ good afternoon';
            else greet = '🌙 good evening';
            document.getElementById('greeting').textContent = greet;
            document.getElementById('time-last-updated').textContent = `tick ${now.toLocaleTimeString()}`;
            checkAlarms(now);
        }

        // ---- WEATHER (CURRENT ONLY, NO FORECASTS) ----
        let currentCoords = { lat: 3.1390, lon: 101.6869 };

        async function getWeather(lat, lon) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.current) {
                    document.getElementById('temperature').textContent = Math.round(data.current.temperature_2m);
                    document.getElementById('feels-like').textContent = `${Math.round(data.current.apparent_temperature)}°`;
                    document.getElementById('humidity').textContent = `${data.current.relative_humidity_2m}%`;
                    document.getElementById('wind').textContent = `${Math.round(data.current.wind_speed_10m)} km/h`;
                    const wIcon = getWeatherSymbol(data.current.weather_code);
                    document.getElementById('weather-icon').textContent = wIcon;
                    document.getElementById('description').textContent = getWeatherDesc(data.current.weather_code);
                    document.getElementById('weather-last-updated').textContent = `updated ${new Date().toLocaleTimeString()}`;

                    // Cache only current weather
                    localStorage.setItem('wxCache', JSON.stringify({
                        current: data.current,
                        lat, lon,
                        ts: Date.now()
                    }));
                }
            } catch (e) {
                showToast('weather offline');
                const cached = localStorage.getItem('wxCache');
                if (cached) {
                    try {
                        const c = JSON.parse(cached);
                        if (Date.now() - c.ts < 3600000 && c.current) {
                            document.getElementById('temperature').textContent = Math.round(c.current.temperature_2m);
                            document.getElementById('feels-like').textContent = `${Math.round(c.current.apparent_temperature)}°`;
                            document.getElementById('humidity').textContent = `${c.current.relative_humidity_2m}%`;
                            document.getElementById('wind').textContent = `${Math.round(c.current.wind_speed_10m)} km/h`;
                            document.getElementById('weather-icon').textContent = getWeatherSymbol(c.current.weather_code);
                            document.getElementById('description').textContent = getWeatherDesc(c.current.weather_code);
                        }
                    } catch (e) { }
                }
            }
        }

        function getWeatherSymbol(code) {
            const map = { 0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️', 51: '🌧️', 53: '🌧️', 55: '🌧️', 61: '🌦️', 63: '🌧️', 65: '🌧️', 66: '🌨️', 67: '🌨️', 71: '🌨️', 73: '🌨️', 75: '❄️', 77: '🌨️', 80: '🌦️', 81: '🌧️', 85: '🌨️', 86: '❄️', 95: '⛈️' };
            return map[code] || '🌡️';
        }

        function getWeatherDesc(code) {
            const desc = { 0: 'clear sky', 1: 'mainly clear', 2: 'partly cloudy', 3: 'overcast', 45: 'fog', 48: 'fog', 51: 'light drizzle', 53: 'moderate drizzle', 55: 'dense drizzle', 61: 'light rain', 63: 'moderate rain', 65: 'heavy rain', 66: 'freezing rain', 67: 'heavy freezing rain', 71: 'light snow', 73: 'moderate snow', 75: 'heavy snow', 77: 'snow grains', 80: 'rain showers', 81: 'heavy showers', 85: 'snow showers', 86: 'heavy snow showers', 95: 'thunderstorm' };
            return desc[code] || 'mixed';
        }

        async function getLocationHuman(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=12`);
                const data = await res.json();
                const city = data.address?.city || data.address?.town || data.address?.village || `${lat.toFixed(1)},${lon.toFixed(1)}`;
                document.getElementById('location').textContent = city;
            } catch (e) {
                document.getElementById('location').textContent = `${lat.toFixed(1)},${lon.toFixed(1)}`;
            }
        }

        function getUserWeather() {
            if (navigator.geolocation) {
                showToast('locating...');
                navigator.geolocation.getCurrentPosition(pos => {
                    currentCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    getWeather(currentCoords.lat, currentCoords.lon);
                    getLocationHuman(currentCoords.lat, currentCoords.lon);
                }, () => {
                    showToast('default location');
                    getWeather(3.1390, 101.6869);
                    document.getElementById('location').textContent = 'Kuala Lumpur';
                });
            } else {
                getWeather(3.1390, 101.6869);
                document.getElementById('location').textContent = 'Kuala Lumpur';
            }
        }

        function refreshWeather() {
            if (currentCoords) {
                getWeather(currentCoords.lat, currentCoords.lon);
                getLocationHuman(currentCoords.lat, currentCoords.lon);
            } else {
                getUserWeather();
            }
        }

        // ----- ALARMS -----
        let alarms = JSON.parse(localStorage.getItem('alarms_blk')) || [];
        let ringingAlarm = null;
        let alarmTimer = null;

        function saveAlarms() {
            localStorage.setItem('alarms_blk', JSON.stringify(alarms));
            renderAlarms();
        }

        function renderAlarms() {
            const container = document.getElementById('alarms-list');
            if (!alarms.length) {
                container.innerHTML = '<div class="empty-alarms">no alarms · tap +</div>';
                return;
            }
            container.innerHTML = alarms.map((a, idx) => `
            <div class="alarm-row">
                <div class="time-display-alarm">${a.time}</div>
                <div class="alarm-buttons">
                    <button class="mini-btn" data-toggle="${idx}">${a.enabled ? '🔔' : '🔕'}</button>
                    <button class="mini-btn" data-del="${idx}">🗑️</button>
                </div>
            </div>
        `).join('');

            document.querySelectorAll('[data-toggle]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let i = parseInt(btn.dataset.toggle);
                    alarms[i].enabled = !alarms[i].enabled;
                    saveAlarms();
                    showToast(`alarm ${alarms[i].enabled ? 'on' : 'off'}`);
                });
            });

            document.querySelectorAll('[data-del]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let i = parseInt(btn.dataset.del);
                    alarms.splice(i, 1);
                    saveAlarms();
                    showToast('deleted');
                });
            });
        }

        function checkAlarms(now) {
            const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            for (let alarm of alarms) {
                if (alarm.enabled && !alarm.snoozed && alarm.time === currentTime) {
                    triggerRing(alarm);
                    break;
                }
                if (alarm.snoozed && alarm.snoozeUntil && new Date() >= new Date(alarm.snoozeUntil)) {
                    alarm.snoozed = false;
                    alarm.snoozeUntil = null;
                    saveAlarms();
                }
            }
        }

        function triggerRing(alarm) {
            if (ringingAlarm) return;
            ringingAlarm = alarm;
            document.getElementById('ringing-time').textContent = alarm.time;
            document.getElementById('alarm-ringing').style.display = 'flex';
            if (navigator.vibrate) navigator.vibrate([500, 300, 500]);
            playBuzz();
            if (alarmTimer) clearTimeout(alarmTimer);
            alarmTimer = setTimeout(() => { stopRing(); }, 60000);
        }

        function playBuzz() {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.2;
                osc.start();
                setTimeout(() => {
                    if (ac.state !== 'closed') {
                        osc.stop();
                        ac.close();
                    }
                }, 2800);
            } catch (e) { }
        }

        function stopRing() {
            document.getElementById('alarm-ringing').style.display = 'none';
            if (alarmTimer) clearTimeout(alarmTimer);
            ringingAlarm = null;
        }

        function snoozeCurrent() {
            if (ringingAlarm) {
                const snoozeTime = new Date(Date.now() + 5 * 60000);
                ringingAlarm.snoozed = true;
                ringingAlarm.snoozeUntil = snoozeTime;
                saveAlarms();
                stopRing();
                showToast('snooze 5 min');
            }
        }

        function addNewAlarm() {
            const val = document.getElementById('alarm-time').value;
            if (!val) { showToast('select time'); return; }
            alarms.push({ time: val, enabled: true, snoozed: false, snoozeUntil: null });
            saveAlarms();
            document.getElementById('alarm-modal').style.display = 'none';
            showToast(`alarm ${val}`);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1800);
        }

        // ----- EVENT LISTENERS -----
        document.getElementById('getLocationBtn').addEventListener('click', getUserWeather);
        document.getElementById('refreshWeatherBtn').addEventListener('click', refreshWeather);
        document.getElementById('addAlarmBtn').addEventListener('click', () => document.getElementById('alarm-modal').style.display = 'flex');
        document.getElementById('setAlarmBtn').addEventListener('click', addNewAlarm);
        document.getElementById('cancelModalBtn').addEventListener('click', () => document.getElementById('alarm-modal').style.display = 'none');
        document.getElementById('snoozeBtn').addEventListener('click', snoozeCurrent);
        document.getElementById('stopAlarmBtn').addEventListener('click', stopRing);
        document.getElementById('ringingSnoozeBtn').addEventListener('click', snoozeCurrent);
        document.getElementById('ringingStopBtn').addEventListener('click', stopRing);

        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('alarm-modal'))
                document.getElementById('alarm-modal').style.display = 'none';
        });

        // ----- INIT -----
        setInterval(updateTime, 1000);
        updateTime();
        initSwipe();
        getUserWeather();
        renderAlarms();

        if ('wakeLock' in navigator)
            navigator.wakeLock.request('screen').catch(e => { });

        // Refresh weather every 10 minutes (only current conditions)
        setInterval(() => {
            if (currentCoords) getWeather(currentCoords.lat, currentCoords.lon);
        }, 600000);
    </script>
</body>

</html>
